name: CI — Lint, Test, Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools==69.5.1
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: ruff check src/ api/ mlops/ tests/ --ignore E501

      - name: Download dataset
        run: |
          mkdir -p data/raw
          curl -L -o data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv \
            "https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv"

      - name: Run data ingestion
        run: python -c "from src.ingestion.pipeline import load_and_validate; load_and_validate()"

      - name: Train models (for integration tests)
        run: python -m src.models.trainer

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/integration/ -v --tb=short -k "not agent"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

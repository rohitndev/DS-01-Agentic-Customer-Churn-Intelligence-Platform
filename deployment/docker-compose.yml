version: "3.9"

services:
  api:
    build: ..
    image: ds01-churn-api:local
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ../data:/var/task/data
      - ../models:/var/task/models
    command: >
      uvicorn api.server:app
        --host 0.0.0.0
        --port 8000
        --workers 2

  mlflow:
    image: python:3.12-slim
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: >
      bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
